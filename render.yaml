# Render Blueprint — deploys a Node web service + Postgres database.
# Apply via: Render dashboard → Blueprints → New Blueprint Instance → connect this repo.
databases:
  - name: property-investment-db
    plan: free
    databaseName: property_investment
    user: property_investment

services:
  - type: web
    name: investprop
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: corepack enable && pnpm install --no-frozen-lockfile && pnpm build
    startCommand: pnpm prisma db push --skip-generate && pnpm start
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: property-investment-db
          property: connectionString
      - key: BASE_URL
        sync: false           # set after first deploy to https://<app>.onrender.com
      - key: JWT_SECRET
        generateValue: true   # Render generates 256-bit secret
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false           # set in Render dashboard
      # Optional integrations — leave blank to skip features:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: EMAIL_SERVICE_API_KEY
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: EMAIL_FROM_NAME
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      # MinIO (file uploads). Demo runs without these but uploads will fail.
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_USE_SSL
        sync: false
      - key: MINIO_BUCKET_NAME
        value: property-images
