<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Investprop — South African Property Investment Platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="10" fill="url(#gold)"/>

  <!-- Skyline motif -->
  <g fill="#334155" opacity="0.55">
    <rect x="80" y="470" width="70" height="120"/>
    <rect x="165" y="420" width="60" height="170"/>
    <rect x="240" y="360" width="80" height="230"/>
    <rect x="335" y="440" width="55" height="150"/>
    <rect x="405" y="400" width="70" height="190"/>
  </g>
  <g fill="#d97706" opacity="0.85">
    <rect x="255" y="360" width="14" height="14"/>
    <rect x="285" y="390" width="14" height="14"/>
    <rect x="255" y="420" width="14" height="14"/>
  </g>

  <!-- Wordmark -->
  <text x="80" y="200" font-family="Helvetica, Arial, sans-serif" font-size="86" font-weight="700" fill="#ffffff">Investprop</text>
  <text x="84" y="250" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="6" fill="#f59e0b">FRACTIONAL PROPERTY INVESTMENT</text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="500" fill="#e2e8f0">Own a slice of South African real estate.</text>
  <text x="80" y="378" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="500" fill="#e2e8f0">Transparent returns. Distressed-property deals.</text>

  <!-- Domain pill -->
  <rect x="80" y="430" rx="26" ry="26" width="270" height="52" fill="url(#gold)"/>
  <text x="215" y="465" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">investprop.io</text>
</svg>
